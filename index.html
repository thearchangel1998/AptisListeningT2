<script>
    // 1. ĐÃ SỬA: Đặt link Apps Script trực tiếp vào biến này
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUSW3enUfuaMn8qCdhoWei8CUNjFe-uQLatS8y3fCTN-9T8HlGn6s-Cy8qVtKpArI/exec";

    // DOM Elements
    const studentNameInput = document.getElementById('student-name');
    const startBtn = document.getElementById('start-btn');
    const welcomeScreen = document.getElementById('welcome-screen');
    const testScreen = document.getElementById('test-screen');
    const displayName = document.getElementById('display-name');
    const submitBtn = document.getElementById('submit-btn');
    const resultMessage = document.getElementById('result-message');
    const reloadBtn = document.getElementById('reload-btn');
    const inputs = document.querySelectorAll('.cloze-input');
    const progressCounter = document.getElementById('progress-counter');

    let studentName = "";

    // Welcome Screen Logic
    studentNameInput.addEventListener('input', (e) => {
        if (e.target.value.trim().length > 0) {
            startBtn.disabled = false;
        } else {
            startBtn.disabled = true;
        }
    });

    startBtn.addEventListener('click', () => {
        studentName = studentNameInput.value.trim();
        displayName.textContent = studentName;
        welcomeScreen.style.display = 'none';
        testScreen.style.display = 'block';
    });

    // Input Progress Logic
    inputs.forEach(input => {
        input.addEventListener('input', updateProgress);
    });

    function updateProgress() {
        let filled = 0;
        inputs.forEach(input => {
            if (input.value.trim() !== '') filled++;
        });
        progressCounter.textContent = `${filled} / ${inputs.length} Điền từ`;
    }

    // Submit Logic
    submitBtn.addEventListener('click', async () => {
        // Thay đổi trạng thái nút
        submitBtn.textContent = "Đang nộp bài...";
        submitBtn.disabled = true;

        // Tính điểm trước để gửi đi
        let correctCount = 0;
        const totalCount = inputs.length;

        inputs.forEach(input => {
            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = input.getAttribute('data-answer').toLowerCase();
            if (userAnswer === correctAnswer) {
                correctCount++;
            }
        });

        // GỌI API LƯU DỮ LIỆU
        try {
            // ĐÃ SỬA: Bỏ lệnh if rườm rà và đổi Content-Type thành text/plain để tránh lỗi CORS trên Github
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify({
                    name: studentName,
                    correct: correctCount,
                    total: totalCount
                })
            });

            // CHỈ THỰC HIỆN CHẤM ĐIỂM SAU KHI FETCH THÀNH CÔNG
            gradeTest(correctCount, totalCount);

        } catch (error) {
            console.error(error);
            alert("Đã xảy ra lỗi khi nộp bài. Vui lòng kiểm tra kết nối mạng và thử lại.");
            submitBtn.textContent = "Kiểm tra đáp án";
            submitBtn.disabled = false;
        }
    });

    function gradeTest(correctCount, totalCount) {
        inputs.forEach(input => {
            const userAnswer = input.value.trim();
            const correctAnswer = input.getAttribute('data-answer');

            // Khóa ô input
            input.disabled = true;

            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                // Trả lời đúng
                input.classList.add('correct');
            } else {
                // Trả lời sai hoặc bỏ trống
                input.classList.add('incorrect');
                if (userAnswer === "") {
                    input.value = "[Trống]";
                }
                
                // Tạo nhãn đáp án đúng
                const correctLabel = document.createElement('span');
                correctLabel.classList.add('answer-label');
                correctLabel.textContent = `✓ ${correctAnswer}`;
                input.parentNode.insertBefore(correctLabel, input.nextSibling);
            }
        });

        // Ẩn nút nộp bài và hiện kết quả & nút làm lại
        submitBtn.style.display = 'none';
        resultMessage.textContent = `Chúc mừng ${studentName}! Kết quả: ${correctCount} / ${totalCount} câu đúng.`;
        resultMessage.style.display = 'block';
        resultMessage.classList.add('result-success');
        reloadBtn.style.display = 'inline-block';
    }
</script>
